name: ise

services:
  postgres:
    image: postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    container_name: ise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks: [ise]

  minio:
    image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: ise-minio
    command: ["server", "/data", "--console-address", ":9001"]
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_API_CORS_ALLOW_ORIGIN: http://127.0.0.1:9999,http://localhost:9999
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks: [ise]

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: ise-api:local
    container_name: ise-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: "3333"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_URLENCODED}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_PUBLIC_ENDPOINT: 127.0.0.1
      MINIO_PUBLIC_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ise
      MAIL_USER: demo@example.test
      MAIL_PASS: ${MAIL_PASS:?MAIL_PASS is required}
      MAIL_FROM: no-reply@example.test
      VITE_WEB_URL: http://127.0.0.1:9999
      ASSET_MANIFEST_PATH: /app/provenance/assets.seed.json
      DISABLE_SWAGGER: "true"
    ports:
      - "127.0.0.1:3333:3333"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 20s
    networks: [ise]

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: ise-agent:local
    container_name: ise-agent
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: "4444"
      AGENT_DB_PATH: /data/agent.sqlite
      AGENT_SQLITE_DRIVER: sql.js
      AGENT_CREDENTIAL_KEY_FILE: /run/secrets/agent_model_master_key
      NEST_API_BASE_URL: http://api:3333
    secrets:
      - agent_model_master_key
    volumes:
      - ./.ise/agent-data:/data
    ports:
      - "127.0.0.1:4444:4444"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4444/model-config').then(r=>process.exit(r.status===401?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 10s
    networks: [ise]

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: ise-web:local
    container_name: ise-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      agent:
        condition: service_healthy
    environment:
      PUBLIC_MAPBOX_TOKEN: ${PUBLIC_MAPBOX_TOKEN:-}
      PUBLIC_WEB_URL: http://127.0.0.1:9999
      API_PROXY_TARGET: http://api:3333
      AGENT_PROXY_TARGET: http://agent:4444
    ports:
      - "127.0.0.1:9999:9999"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9999/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 15s
    networks: [ise]

networks:
  ise:
    name: ise

secrets:
  agent_model_master_key:
    file: ./.ise/docker-secrets/agent-model-key

volumes:
  postgres-data:
    external: true
    name: ise-postgres-data
  minio-data:
    external: true
    name: ise-minio-data
